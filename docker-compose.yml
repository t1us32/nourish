name: nourish

services:
  api:
    build: ./backend
    environment:
      FDC_API_KEY: ${FDC_API_KEY:-}
      SEARCH_HISTORY_PATH: /data/recent-searches.json
    volumes:
      - nourish_data:/data
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  nourish_data:
