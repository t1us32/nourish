name: nourish

services:
  api:
    build: ./backend
    environment:
      FDC_API_KEY: ${FDC_API_KEY:-}
      SEARCH_HISTORY_PATH: /data/recent-searches.json
    volumes:
      - nourish_data:/data
    restart: unless-stopped

  web:
    build: ./frontend
    depends_on:
      - api
    restart: unless-stopped

  https:
    image: caddy:2.8-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  nourish_data:
